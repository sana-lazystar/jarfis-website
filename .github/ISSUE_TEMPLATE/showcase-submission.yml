name: Showcase Submission
description: Submit your project to the JARFIS Showcase gallery
title: "[Showcase] Your Project Name"
labels: ["showcase", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting your project to the JARFIS Showcase! 
        Please fill out the information below and we'll review your submission.

  - type: input
    id: project-name
    attributes:
      label: Project Name
      description: What is your project called?
      placeholder: "My Awesome Project"
    validations:
      required: true

  - type: input
    id: project-url
    attributes:
      label: Project URL
      description: The live URL where we can view your project
      placeholder: "https://myproject.example.com"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Project Description
      description: Briefly describe your project (1-2 sentences)
      placeholder: "A SaaS dashboard built with JARFIS agents in 2 weeks..."
    validations:
      required: true

  - type: input
    id: repo-url
    attributes:
      label: Repository URL (optional)
      description: Link to the source code repository if public
      placeholder: "https://github.com/your-username/your-project"
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot (optional)
      description: |
        Attach a screenshot of your project (drag and drop an image here).
        Recommended: 1200x675px (16:9 ratio)
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags (optional)
      description: Comma-separated tags to categorize your project
      placeholder: "web, saas, react, jarfis"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Agreement
      description: By submitting this form, you agree to the following
      options:
        - label: "This project was built using JARFIS"
          required: true
        - label: "I have the right to submit this project"
          required: true
        - label: "The project URL is publicly accessible"
          required: true
