version: 2

updates:
  # npm / pnpm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
    groups:
      tailwind-ecosystem:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      dev-tools:
        patterns:
          - "eslint*"
          - "prettier*"
          - "typescript"
    ignore:
      # eslint-config-next가 eslint 10을 미지원 (eslint-plugin-react 호환성 문제)
      # eslint-config-next 업데이트 시 이 제한 해제
      - dependency-name: "eslint"
        versions: [">=10.0.0"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(actions)"
