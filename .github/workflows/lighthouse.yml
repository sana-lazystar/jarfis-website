name: Lighthouse CI

on:
  pull_request:
    branches: [main]

# Read-only permissions for PR quality checks
permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse performance audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Audit the built static output directly (no external URL needed)
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ".lighthouserc.yml"

  report:
    name: Post Lighthouse results as PR comment
    needs: lighthouse
    runs-on: ubuntu-latest
    # Only post comment when running on a PR (not forks, to avoid permission issues)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download Lighthouse results
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-results
          path: ./lighthouse-results
        continue-on-error: true

      - name: Post Lighthouse summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const resultsDir = './lighthouse-results';
            if (!fs.existsSync(resultsDir)) {
              console.log('No Lighthouse results found, skipping comment.');
              return;
            }

            const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('.json'));
            if (files.length === 0) {
              console.log('No JSON result files found.');
              return;
            }

            let commentBody = '## Lighthouse CI Results\n\n';
            commentBody += '| Page | Performance | Accessibility | Best Practices | SEO |\n';
            commentBody += '|------|------------|--------------|----------------|-----|\n';

            let hasFailure = false;

            for (const file of files) {
              try {
                const data = JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8'));
                const cats = data.categories || {};

                const perf = Math.round((cats.performance?.score ?? 0) * 100);
                const a11y = Math.round((cats.accessibility?.score ?? 0) * 100);
                const bp   = Math.round((cats['best-practices']?.score ?? 0) * 100);
                const seo  = Math.round((cats.seo?.score ?? 0) * 100);

                const perfIcon  = perf  >= 90 ? '✅' : '❌';
                const a11yIcon  = a11y  >= 90 ? '✅' : '⚠️';

                if (perf < 90) hasFailure = true;

                const pageName = file.replace(/\.report\.json$/, '').replace(/[_-]/g, '/');
                commentBody += `| \`${pageName}\` | ${perfIcon} ${perf} | ${a11yIcon} ${a11y} | ${bp} | ${seo} |\n`;
              } catch (e) {
                console.log(`Could not parse ${file}: ${e.message}`);
              }
            }

            commentBody += '\n';
            if (hasFailure) {
              commentBody += '> ❌ **Performance budget violation**: One or more pages scored below 90. Please investigate before merging.\n';
            } else {
              commentBody += '> ✅ All pages meet the Performance >= 90 budget.\n';
            }

            commentBody += '\n> Thresholds: Performance >= 90, Accessibility >= 90\n';
            commentBody += '> Generated by [Lighthouse CI](https://github.com/treosh/lighthouse-ci-action)';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Lighthouse CI Results')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }
